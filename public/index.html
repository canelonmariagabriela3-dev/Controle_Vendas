<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Controle de Fiados</title>
    
</head>
<body class="bg-dark text-white">
   <body class="bg-light">

<div class="container mt-5">

  <h1 class="text-center text-danger mb-4">
    Controle de Fiados
  </h1>
  <p class="text-center text-danger mb-4">
  Controle simples de vendas fiado e pagamentos
</p>

  <div class="card shadow p-4 mb-4">

    <h3 class="mb-3">Novo Cliente</h3>

    <input 
      id="nome"
      class="form-control mb-2"
      placeholder="Nome"
    >

    <input 
      id="telefone"
      class="form-control mb-2"
      placeholder="Telefone"
    >

    <input 
      id="local"
      class="form-control mb-3"
      placeholder="Local de trabalho"
    >

    <button 
      onclick="criarCliente()"
      class="btn btn-danger"
    >
      Criar Cliente
    </button>

  </div>

  <div class="d-flex justify-content-between mb-3">

    <h2>Clientes</h2>

    <button 
      onclick="listarClientes()"
      class="btn btn-warning"
    >
      Atualizar
    </button>
    </div>
    </div>

<div class="d-flex mb-4">

  <input
    type="text"
    id="pesquisa"
    class="form-control me-2"
    placeholder="Pesquisar cliente"
  >

  <button
    class="btn btn-danger"
    onclick="pesquisarCliente()"
  >
    Pesquisar
  </button>

</div>
    

  <div id="lista" class="row"></div>

</div>

<script src="script.js"></script>

</body>
</body>
</html>
